version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: scrimba_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/scrimba_db
      CORS_ORIGINS: '["http://localhost:3000"]'
      UPLOAD_DIR: /app/uploads
    volumes:
      - ./backend:/app
      - upload_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    depends_on:
      - backend
    command: npm run dev

volumes:
  # IMPORTANT: To rebuild frontend without losing DB data, use:
  #   docker-compose up --build frontend
  # To reset ONLY frontend caches:
  #   docker volume rm codestudio_frontend_node_modules codestudio_frontend_next
  # NEVER use "docker-compose down -v" — it deletes ALL volumes including the database!
  postgres_data:
    # Mark as external=false (default) but document that this is precious data
    name: codestudio_postgres_data
  upload_data:
    name: codestudio_upload_data
  frontend_node_modules:
    name: codestudio_frontend_node_modules
  frontend_next:
    name: codestudio_frontend_next
